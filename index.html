<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="upper-row">
        <img src="icons/search.svg" alt="search icon">
        <input type="text">
        <img src="icons/notifications.svg" alt="notifications icon">
        <img src="profile-icons/main-user.png" alt="profile icon">
        <h4>Lucas Azevedo</h4>
      </div>
      <div class="lower-row">
        <img src="profile-icons/main-user.png" alt="profile icon">
        <div class="greetings">
          <p>Hi, there</p>
          <h2>Lucas Azevedo (@lucas)</h2>
        </div>
        <button>New</button>
        <button>Upload</button>
        <button>Share</button>
      </div>
    </div>


    <div class="sidebar">
      <div class="sidebar-title">
        <img src="icons/dashboard.svg" alt="dashboard icon">
        <p>Dashboard</p>
      </div>
      <div class="sidebar-item">
        <img src="icons/home.svg" alt="home icon">
        <p>Home</p>
      </div>
      <div class="sidebar-item">
        <img src="icons/profile.svg" alt="profile icon">
        <p>Profile</p>
      </div>
      <div class="sidebar-item">
        <img src="icons/messages.svg" alt="messages icon">
        <p>Messages</p>
      </div>
      <div class="sidebar-item">
        <img src="icons/history.svg" alt="history icon">
        <p>History</p>
      </div>
      <div class="sidebar-item">
        <img src="icons/tasks.svg" alt="tasks icon">
        <p>Tasks</p>
      </div>
      <div class="sidebar-item">
        <img src="icons/communities.svg" alt="communities icon">
        <p>Communities</p>
      </div>
      <div class="sidebar-item">
        <img src="icons/settings.svg" alt="settings icon">
        <p>Settings</p>
      </div>
      <div class="sidebar-item">
        <img src="icons/support.svg" alt="support icon">
        <p>Support</p>
      </div>
      <div class="sidebar-item">
        <img src="icons/privacy.svg" alt="privacy icon">
        <p>Privacy</p>
      </div>
    </div>
  </div>
</body>
</html>
